version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kuppet_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: kuppet_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/kuppet.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: kuppet_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: kuppethomabay
      MYSQL_USER: jamadata
      MYSQL_PASSWORD: "Jama@2026#Kuppet!9X"
      MYSQL_ROOT_PASSWORD: "Root@2026#Kuppet!9X"
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: