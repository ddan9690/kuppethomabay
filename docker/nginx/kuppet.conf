# 1. HTTP to HTTPS Redirection
server {
    listen 80;
    server_name kuppethomabay.co.ke www.kuppethomabay.co.ke;

    # Certbot challenge path
    location /.well-known/acme-challenge/ {
        allow all;
        root /var/www/certbot;
    }

    # Permanent redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS Server Block
server {
    listen 443 ssl;
    server_name kuppethomabay.co.ke www.kuppethomabay.co.ke;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/kuppethomabay.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kuppethomabay.co.ke/privkey.pem;

    root /var/www/kuppethomabay/public;
    index index.php index.html;

    # Laravel application
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Adminer proxy
    location /adminer {
        rewrite ^/adminer(/.*)$ $1 break;
        proxy_pass http://adminer:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /adminer/;
    }

    # PHP-FPM processing
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/kuppethomabay/public/$fastcgi_script_name;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Deny access to sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    client_max_body_size 50M;
}
